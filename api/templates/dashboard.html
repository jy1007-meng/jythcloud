<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据大屏</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --site-color: #6366f1; }
body { background: #050510; color: #e8e8f0; font-family: system-ui, sans-serif; overflow-x: hidden; }
.card { background: rgba(26,26,46,.85); backdrop-filter: blur(10px); border: 1px solid rgba(42,42,62,.6); border-radius: 16px; padding: 1.5rem; }
.number { font-variant-numeric: tabular-nums; }
.glow { text-shadow: 0 0 20px rgba(99,102,241,.5); }
.bar { transition: height 0.5s ease; }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.spin { animation: spin 3s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="max-w-7xl mx-auto p-4">
  <!-- 头部 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <div class="text-3xl font-bold glow" id="siteTitle">数据大屏</div>
      <div class="text-sm text-gray-500 mt-1">实时监控 · 数据可视化</div>
    </div>
    <div class="flex gap-3 items-center">
      <select id="siteSelector" class="bg-[#12121a] border border-[#2a2a3e] rounded-lg px-3 py-2 text-sm" onchange="refreshAll()">
        <option value="jy">吉天宇站</option>
        <option value="tan">谭海涛站</option>
        <option value="hu">胡子雄站</option>
      </select>
      <span class="text-xs text-gray-500"><i class="fas fa-circle text-emerald-400 text-xs mr-1 pulse"></i>LIVE</span>
    </div>
  </div>

  <!-- 顶部卡片 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card text-center">
      <div class="text-sm text-gray-500 mb-1"><i class="fas fa-users mr-1"></i>总访问</div>
      <div class="text-4xl font-bold text-indigo-400 number" id="totalVisitors">--</div>
    </div>
    <div class="card text-center">
      <div class="text-sm text-gray-500 mb-1"><i class="fas fa-eye mr-1"></i>今日PV</div>
      <div class="text-4xl font-bold text-emerald-400 number" id="todayPV">--</div>
    </div>
    <div class="card text-center">
      <div class="text-sm text-gray-500 mb-1"><i class="fas fa-user-check mr-1"></i>今日UV</div>
      <div class="text-4xl font-bold text-amber-400 number" id="todayUV">--</div>
    </div>
    <div class="card text-center">
      <div class="text-sm text-gray-500 mb-1"><i class="fas fa-circle-dot mr-1 pulse"></i>实时在线</div>
      <div class="text-4xl font-bold text-pink-400 number" id="onlineCount">--</div>
    </div>
  </div>

  <!-- 中间行 -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <!-- PV 趋势图 -->
    <div class="card md:col-span-2">
      <h3 class="font-semibold mb-4"><i class="fas fa-chart-line mr-2 text-indigo-400"></i>近30天访问趋势</h3>
      <div class="relative h-48" id="pvTrendChart"></div>
    </div>
    <!-- 城市分布 -->
    <div class="card">
      <h3 class="font-semibold mb-4"><i class="fas fa-location-dot mr-2 text-emerald-400"></i>访客来源</h3>
      <div id="cityList" class="space-y-2"></div>
    </div>
  </div>

  <!-- 底部行 -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <!-- 热门页面 -->
    <div class="card">
      <h3 class="font-semibold mb-4"><i class="fas fa-file-lines mr-2 text-amber-400"></i>热门页面</h3>
      <div id="topPages" class="space-y-2"></div>
    </div>
    <!-- 文章排行 -->
    <div class="card">
      <h3 class="font-semibold mb-4"><i class="fas fa-newspaper mr-2 text-pink-400"></i>热门文章</h3>
      <div id="topArticles" class="space-y-2"></div>
    </div>
  </div>

  <!-- 留言趋势 -->
  <div class="card mb-6">
    <h3 class="font-semibold mb-4"><i class="fas fa-comments mr-2 text-cyan-400"></i>留言趋势（近30天）</h3>
    <div class="relative h-32" id="msgTrendChart"></div>
  </div>
</div>

<script>
const API = '';
let site = 'jy';

function getSiteName(s) { return {jy:'吉天宇',tan:'谭海涛',hu:'胡子雄'}[s]||s; }

async function refreshAll() {
  site = document.getElementById('siteSelector').value;
  document.getElementById('siteTitle').textContent = getSiteName(site) + ' - 数据大屏';
  try {
    const r = await fetch(API+'/api/dashboard/'+site);
    const d = await r.json();
    if (!d) return;
    
    // 总访问
    document.getElementById('totalVisitors').textContent = (d.config?.visitor_count ?? '--').toLocaleString();
    // 今日PV/UV
    const lastPv = d.pv_trend?.length > 0 ? d.pv_trend[d.pv_trend.length-1] : null;
    document.getElementById('todayPV').textContent = lastPv?.pv ?? 0;
    document.getElementById('todayUV').textContent = lastPv?.uv ?? 0;
    document.getElementById('onlineCount').textContent = d.online ?? 0;

    // PV趋势
    renderPVTrend(d.pv_trend);
    // 城市
    renderCities(d.cities);
    // 热门页面
    renderTopPages(d.top_pages);
    // 热门文章
    renderTopArticles(d.articles);
    // 留言趋势
    renderMsgTrend(d.msg_trend);
  } catch(e) {
    console.error('Dashboard error:', e);
  }
}

function renderPVTrend(trend) {
  const el = document.getElementById('pvTrendChart');
  if (!trend || trend.length===0) { el.innerHTML = '<div class="text-gray-500 text-center pt-16">暂无数据</div>'; return; }
  const max = Math.max(...trend.map(t=>t.pv), 1);
  el.innerHTML = `<div class="flex items-end gap-1 h-full absolute bottom-0 left-0 right-0 px-2 pb-6">${
    trend.map(t => {
      const pct = Math.max(t.pv/max*100, 2);
      return `<div class="flex-1 flex flex-col items-center justify-end"><div class="w-full rounded-t bar" style="height:${pct}%;background:linear-gradient(to top,var(--site-color),#a78bfa);opacity:.8"></div></div>`;
    }).join('')
  }</div><div class="flex justify-between text-xs text-gray-600 mt-2">${
    trend.filter((_,i)=>i%5===0||i===trend.length-1).map(t => `<span>${t.date.slice(5)}</span>`).join('')
  }</div>`;
}

function renderCities(cities) {
  if (!cities || cities.length===0) return;
  const max = Math.max(...cities.map(c=>c.count), 1);
  document.getElementById('cityList').innerHTML = cities.map(c => `
    <div><div class="flex justify-between text-sm mb-1"><span>${c.city}</span><span class="text-gray-500">${c.count}</span></div><div class="w-full h-2 bg-[#2a2a3e] rounded-full overflow-hidden"><div class="h-full rounded-full bg-emerald-500/60" style="width:${c.count/max*100}%"></div></div></div>
  `).join('');
}

function renderTopPages(pages) {
  if (!pages || pages.length===0) { document.getElementById('topPages').innerHTML = '<div class="text-gray-500 text-sm">暂无数据</div>'; return; }
  document.getElementById('topPages').innerHTML = pages.map((p, i) => `
    <div class="flex justify-between items-center py-1"><span class="text-sm"><span class="text-gray-600 mr-2">#${i+1}</span>${p.page}</span><span class="text-xs text-gray-500">${p.cnt}次</span></div>
  `).join('');
}

function renderTopArticles(arts) {
  if (!arts || arts.length===0) { document.getElementById('topArticles').innerHTML = '<div class="text-gray-500 text-sm">暂无文章</div>'; return; }
  document.getElementById('topArticles').innerHTML = arts.map((a, i) => `
    <div class="flex justify-between items-center py-1"><span class="text-sm truncate"><span class="text-gray-600 mr-2">#${i+1}</span>${a.title}</span><span class="text-xs text-gray-500">${a.view_count}次</span></div>
  `).join('');
}

function renderMsgTrend(trend) {
  const el = document.getElementById('msgTrendChart');
  if (!trend || trend.length===0) { el.innerHTML = '<div class="text-gray-500 text-center pt-8">暂无留言数据</div>'; return; }
  const max = Math.max(...trend.map(t=>t.cnt), 1);
  el.innerHTML = `<div class="flex items-end gap-1 h-full absolute bottom-0 left-0 right-0 px-2 pb-6">${
    trend.map(t => {
      const pct = Math.max(t.cnt/max*100, 2);
      return `<div class="flex-1 flex flex-col items-center justify-end"><div class="w-full rounded-t bar" style="height:${pct}%;background:linear-gradient(to top,#06b6d4,#22d3ee);opacity:.7"></div></div>`;
    }).join('')
  }</div>`;
}

// 自动刷新
refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
