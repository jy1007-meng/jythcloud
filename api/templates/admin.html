<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<script src="https://cdn.tailwindcss.com">
tailwind.config={theme:{extend:{colors:{dark:{bg:'#0a0a0f',card:'#12121a',border:'#2a2a3e',surface:'#1a1a2e'}}}}}
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--accent:#6366f1}
body{background:#0a0a0f;color:#e8e8f0;font-family:system-ui,-apple-system,sans-serif}
.sidebar{background:#0d0d16;border-right:1px solid #1e1e2e;width:220px}
.sidebar a{padding:10px 16px;display:flex;align-items:center;gap:10px;color:#8888a0;border-radius:8px;margin:2px 8px;transition:.2s;text-decoration:none}
.sidebar a:hover,.sidebar a.active{background:rgba(99,102,241,.12);color:#e8e8f0}
.sidebar a.active{border-left:3px solid var(--accent)}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:20px}
.btn{background:var(--accent);color:#fff;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;transition:.2s;font-size:14px}
.btn:hover{filter:brightness(1.15)}
.btn-sm{background:var(--accent);color:#fff;padding:4px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.btn-red{background:#ef4444}
.btn-ghost{background:transparent;border:1px solid #2a2a3e;color:#aaa}
.inp{background:#0d0d16;border:1px solid #2a2a3e;border-radius:8px;padding:8px 12px;color:#e8e8f0;width:100%;outline:none;transition:.2s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
table{width:100%;border-collapse:collapse}
td,th{padding:10px 12px;text-align:left;border-bottom:1px solid #1a1a2a}
th{color:#666;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{padding:2px 10px;border-radius:999px;font-size:11px}
.badge-green{background:rgba(16,185,129,.15);color:#10b981}
.badge-yellow{background:rgba(234,179,8,.15);color:#eab308}
.badge-gray{background:rgba(100,100,120,.15);color:#888}
.modal-overlay{background:rgba(0,0,0,.6);position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center}
.modal-box{background:#12121a;border:1px solid #2a2a3e;border-radius:16px;padding:24px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:10px 20px;border-radius:10px;z-index:100;display:none;font-size:14px}
.stats-card{background:linear-gradient(135deg,#12121a,#16162a);border:1px solid #1e1e2e;border-radius:12px;padding:16px;text-align:center}
.bar-container{display:flex;align-items:flex-end;gap:2px;height:100px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:70%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s;background:linear-gradient(to top,var(--accent),#a78bfa)}
.bar-label{font-size:9px;color:#666;margin-top:4px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
select.inp{cursor:pointer}
</style>
</head>
<body>
<div id="app" style="display:flex;min-height:100vh"></div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let token = localStorage.getItem('token')||'';
let site = localStorage.getItem('admin_site')||'jy';
let currentTab = 'dashboard';
let allArticles = [], allMessages = [];

const siteNames = {jy:'吉天宇',tan:'谭海涛',hu:'胡子雄'};

function showToast(msg, color='#10b981') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.style.display = ''; setTimeout(()=>t.style.display='none', 2500);
}

async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (token) opts.headers['Authorization'] = 'Bearer '+token;
  if (body) opts.body = JSON.stringify(body);
  const fullPath = path.startsWith('/api/') ? path : '/api'+path;
  const r = await fetch(fullPath, opts);
  return r.json();
}

async function checkAuth() {
  if (!token) return false;
  const d = await api('POST','/api/auth/verify');
  return d.valid;
}

// ─── 主渲染函数 ───
async function render() {
  const authed = await checkAuth();
  if (!authed) {
    document.getElementById('app').innerHTML = `
      <div class="flex-1 flex items-center justify-center">
        <div class="card max-w-sm w-full mx-4">
          <div class="text-center mb-6"><i class="fas fa-crown text-3xl" style="color:var(--accent)"></i>
          <h2 class="text-xl font-bold mt-2">管理后台</h2></div>
          <div class="space-y-3">
            <input id="l_user" class="inp" placeholder="用户名" value="admin">
            <input id="l_pass" class="inp" type="password" placeholder="密码" value="admin123">
            <button onclick="doLogin()" class="btn w-full">登 录</button>
          </div>
        </div>
      </div>`;
    return;
  }
  renderLayout();
  if (currentTab==='dashboard') await loadDashboard();
  else if (currentTab==='messages') await loadMessages();
  else if (currentTab==='articles') await loadArticles();
  else if (currentTab==='settings') await loadSettings();
  else if (currentTab==='users') await loadUsers();
  else if (currentTab==='security') await loadSecurity();
  else await loadDashboard();
}

async function doLogin() {
  const u = document.getElementById('l_user').value;
  const p = document.getElementById('l_pass').value;
  try {
    const r = await fetch('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
    const d = await r.json();
    if (d.token) {
    token = d.token;
    localStorage.setItem('token', d.token);
    render();
    } else {
      showToast('登录失败: '+(d.error||'未知错误'), '#ef4444');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, '#ef4444');
  }
}

function renderLayout() {
  const tabs = [
    {id:'dashboard', icon:'chart-simple', label:'仪表盘'},
    {id:'messages', icon:'comments', label:'留言管理'},
    {id:'articles', icon:'newspaper', label:'文章管理'},
    {id:'settings', icon:'gear', label:'站点设置'},
    {id:'users', icon:'users', label:'管理员'},
    {id:'security', icon:'lock', label:'安全设置'},
  ];
  document.getElementById('app').innerHTML = `
    <div class="sidebar flex-shrink-0 flex flex-col p-3">
      <div class="text-lg font-bold px-3 py-4" style="background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
        <i class="fas fa-crown mr-2"></i>后台
      </div>
      <select id="siteSwitcher" class="inp text-sm mb-4" onchange="switchSite(this.value)">
        <option value="jy" ${site==='jy'?'selected':''}>吉天宇</option>
        <option value="tan" ${site==='tan'?'selected':''}>谭海涛</option>
        <option value="hu" ${site==='hu'?'selected':''}>胡子雄</option>
      </select>
      <nav class="flex-1 space-y-1">
        ${tabs.map(t => `<a href="#" class="${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')"><i class="fas fa-${t.icon} w-5"></i>${t.label}</a>`).join('')}
      </nav>
      <div class="border-t border-[#1e1e2e] pt-3 mt-2 text-sm text-gray-500 px-3">
        <div id="userInfo">admin</div>
        <a href="#" onclick="logout()" class="text-red-400 hover:text-red-300 block mt-1"><i class="fas fa-sign-out-alt mr-1"></i>退出</a>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto p-6" id="content"></div>`;
}

function switchSite(s) { site=s; localStorage.setItem('admin_site',s); loadDashboard(); }
function switchTab(t) { currentTab=t; renderLayout(); window[`load${t.charAt(0).toUpperCase()+t.slice(1)}`](); }

function logout() { token=''; localStorage.removeItem('token'); render(); }

// ═══ 仪表盘 ═══
async function loadDashboard() {
  const d = await api('GET', `/api/admin/dashboard/${site}`);
  document.getElementById('content').innerHTML = `
    <h2 class="text-2xl font-bold mb-6">📊 ${siteNames[site]} · 仪表盘</h2>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
      <div class="stats-card"><div class="text-2xl font-bold text-indigo-400">${d.visitors?.total||0}</div><div class="text-xs text-gray-500 mt-1">总访问</div></div>
      <div class="stats-card"><div class="text-2xl font-bold text-emerald-400">${d.today?.pv||0}</div><div class="text-xs text-gray-500 mt-1">今日PV</div></div>
      <div class="stats-card"><div class="text-2xl font-bold text-amber-400">${d.today?.uv||0}</div><div class="text-xs text-gray-500 mt-1">今日UV</div></div>
      <div class="stats-card"><div class="text-2xl font-bold text-pink-400">${d.messages?.unread||0}</div><div class="text-xs text-gray-500 mt-1">未读留言</div></div>
      <div class="stats-card"><div class="text-2xl font-bold text-cyan-400">${d.articles?.published||0}</div><div class="text-xs text-gray-500 mt-1">文章</div></div>
    </div>
    <div class="grid grid-cols-2 gap-6">
      <div class="card">
        <h3 class="font-semibold mb-3">📈 近7日趋势</h3>
        <div id="trendChart" class="bar-container">${renderTrendChart(d.trend||[])}</div>
      </div>
      <div class="card">
        <h3 class="font-semibold mb-3">💬 最新留言</h3>
        <div class="space-y-2">${(d.recent_messages||[]).slice(0,5).map(m => `<div class="border-b border-[#1e1e2e] pb-2"><div class="text-sm">${m.name}</div><div class="text-xs text-gray-500">${(m.content||'').slice(0,50)}${m.content?.length>50?'...':''}</div><div class="text-xs text-gray-600">${m.created_at||''}</div></div>`).join('')||'<div class="text-gray-500 text-sm">暂无</div>'}</div>
      </div>
    </div>`;
}

function renderTrendChart(trend) {
  if (!trend.length) return '<div class="text-gray-500 text-sm w-full text-center pt-8">暂无数据</div>';
  const max = Math.max(...trend.map(t=>t.pv), 1);
  return trend.map(t => {
    const h = Math.max(t.pv/max*100, 3);
    return `<div class="bar-item"><div class="bar" style="height:${h}%"></div><span class="bar-label">${t.date.slice(5)}</span><span class="text-[9px] text-gray-600">${t.pv}</span></div>`;
  }).join('');
}

// ═══ 留言管理 ═══
async function loadMessages() {
  const msgs = await api('GET', `/api/messages/${site}`);
  allMessages = msgs||[];
  document.getElementById('content').innerHTML = `
    <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">💬 留言管理</h2><span class="text-sm text-gray-500">共 ${msgs.length||0} 条</span></div>
    <div class="card overflow-x-auto">
      ${!msgs||!msgs.length ? '<div class="text-gray-500 text-center py-8">暂无留言</div>' :
      `<table><thead><tr><th>#</th><th>姓名</th><th>内容</th><th>时间</th><th>状态</th><th>操作</th></tr></thead><tbody>
      ${msgs.map((m,i) => `<tr>
        <td class="text-gray-500 text-sm">${i+1}</td>
        <td class="font-medium">${m.name}</td>
        <td class="max-w-xs truncate text-sm text-gray-400">${m.content}</td>
        <td class="text-sm text-gray-500">${(m.created_at||'').slice(0,16)}</td>
        <td>${m.is_read ? '<span class="badge badge-green">已读</span>' : (m.reply_content ? '<span class="badge badge-green">已回复</span>' : '<span class="badge badge-yellow">未读</span>')}</td>
        <td><button onclick="replyMsg(${m.id},'${m.name}')" class="text-indigo-400 hover:text-indigo-300 mr-2 text-sm" title="回复"><i class="fas fa-reply"></i></button>
        <button onclick="deleteMsg(${m.id})" class="text-red-400 hover:text-red-300 text-sm" title="删除"><i class="fas fa-trash"></i></button></td>
      </tr>`).join('')}
      </tbody></table>`}
    </div>`;
}

function replyMsg(id, name) {
  openModal(`
    <h3 class="text-lg font-bold mb-4">回复留言 - ${name}</h3>
    <textarea id="replyContent" class="inp" rows="4" placeholder="输入回复内容..."></textarea>
    <div class="flex gap-3 mt-4 justify-end">
      <button onclick="closeModal()" class="btn btn-ghost">取消</button>
      <button onclick="submitReply(${id})" class="btn">发送回复</button>
    </div>`);
}

async function submitReply(id) {
  const reply = document.getElementById('replyContent').value;
  if (!reply) return showToast('请输入回复内容','#ef4444');
  await api('POST', `/api/admin/message/${id}/reply`, {reply});
  closeModal(); showToast('回复成功！'); loadMessages();
}

async function deleteMsg(id) {
  if (!confirm('确定删除这条留言？')) return;
  await api('DELETE', `/api/admin/message/${id}`);
  showToast('已删除'); loadMessages();
}

// ═══ 文章管理 ═══
async function loadArticles() {
  const d = await api('GET', `/api/admin/articles/${site}`);
  allArticles = d.articles||[];
  const pub = allArticles.filter(a=>a.status==1).length;
  document.getElementById('content').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold">📝 文章管理</h2>
      <button onclick="showNewArticle()" class="btn"><i class="fas fa-plus mr-1"></i>新建</button>
    </div>
    <div class="card overflow-x-auto">
      ${!allArticles.length ? '<div class="text-gray-500 text-center py-8">暂无文章</div>' :
      `<table><thead><tr><th>标题</th><th>标签</th><th>阅读</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>
      ${allArticles.map((a,i) => `<tr>
        <td class="font-medium max-w-xs truncate">${a.title}</td>
        <td class="text-sm text-gray-500">${a.tags||'-'}</td>
        <td class="text-sm text-gray-400">${a.view_count||0}</td>
        <td>${a.status==1?'<span class="badge badge-green">已发布</span>':'<span class="badge badge-yellow">草稿</span>'}</td>
        <td class="text-sm text-gray-500">${(a.created_at||'').slice(0,10)}</td>
        <td><button onclick="editArticle(${a.id})" class="text-indigo-400 hover:text-indigo-300 text-sm mr-2" title="编辑"><i class="fas fa-edit"></i></button>
        <button onclick="deleteArticle(${a.id})" class="text-red-400 hover:text-red-300 text-sm" title="删除"><i class="fas fa-trash"></i></button></td>
      </tr>`).join('')}
      </tbody></table>`}
    </div>`;
}

function showNewArticle() { showArticleEditor(null); }
function editArticle(id) { showArticleEditor(allArticles.find(a=>a.id===id)); }

function showArticleEditor(article) {
  const isEdit = !!article;
  openModal(`
    <h3 class="text-lg font-bold mb-4">${isEdit?'编辑文章':'新建文章'}</h3>
    <div class="space-y-3">
      <input id="artTitle" class="inp" placeholder="文章标题" value="${isEdit?article.title:''}">
      <input id="artTags" class="inp" placeholder="标签（逗号分隔）" value="${isEdit?article.tags||'':''}">
      <textarea id="artContent" class="inp" rows="8" placeholder="文章内容（支持Markdown）" style="font-family:monospace">${isEdit?article.content||'':''}</textarea>
      <div class="flex gap-3">
        <button onclick="saveArticle(${isEdit?article.id:'null'},1)" class="btn">发布</button>
        <button onclick="saveArticle(${isEdit?article.id:'null'},0)" class="btn btn-ghost">保存草稿</button>
        <button onclick="closeModal()" class="btn btn-ghost ml-auto">取消</button>
      </div>
    </div>`);
}

async function saveArticle(id, status) {
  const title = document.getElementById('artTitle').value;
  const content = document.getElementById('artContent').value;
  const tags = document.getElementById('artTags').value;
  if (!title) return showToast('请输入标题','#ef4444');
  const body = {site, title, content, tags, status, summary: content.slice(0,200)};
  if (id) {
    await api('PUT', `/api/admin/article/${id}`, body);
    showToast('文章已更新！');
  } else {
    await api('POST', '/api/admin/article', body);
    showToast(status?'文章已发布！':'草稿已保存！');
  }
  closeModal(); loadArticles();
}

async function deleteArticle(id) {
  if (!confirm('确定删除此文章？')) return;
  await api('DELETE', `/api/admin/article/${id}`);
  showToast('已删除'); loadArticles();
}

// ═══ 站点设置 ═══
async function loadSettings() {
  const d = await api('GET', `/api/admin/site-config/${site}`);
  const cfg = d||{};
  document.getElementById('content').innerHTML = `
    <h2 class="text-2xl font-bold mb-6">⚙️ ${siteNames[site]} · 站点设置</h2>
    <div class="card max-w-lg space-y-4">
      <div><label class="text-sm text-gray-500 block mb-1">站点名称</label><input id="sName" class="inp" value="${cfg.site_name||''}"></div>
      <div><label class="text-sm text-gray-500 block mb-1">副标题</label><input id="sSub" class="inp" value="${cfg.site_subtitle||''}"></div>
      <div><label class="text-sm text-gray-500 block mb-1">头像文字</label><input id="sAvatar" class="inp" value="${cfg.avatar_text||''}"></div>
      <div><label class="text-sm text-gray-500 block mb-1">主题颜色</label><input id="sColor" class="inp" type="color" value="${cfg.theme_color||'#6366f1'}"></div>
      <div><label class="text-sm text-gray-500 block mb-1">关于我</label><textarea id="sAbout" class="inp" rows="4">${cfg.about_text||''}</textarea></div>
      <div class="flex gap-3">
        <button onclick="saveSettings()" class="btn">保存设置</button>
        <button onclick="clearVisits()" class="btn btn-red btn-ghost"><i class="fas fa-trash mr-1"></i>清除访问数据</button>
      </div>
    </div>`;
}

async function saveSettings() {
  const data = {
    site_name: document.getElementById('sName').value,
    site_subtitle: document.getElementById('sSub').value,
    avatar_text: document.getElementById('sAvatar').value,
    theme_color: document.getElementById('sColor').value,
    about_text: document.getElementById('sAbout').value,
  };
  await api('PUT', `/api/admin/site-config/${site}`, data);
  showToast('设置已保存！');
}

async function clearVisits() {
  if (!confirm('确定清除所有访问数据？（不可恢复）')) return;
  await api('DELETE', `/api/admin/clear-visits/${site}`);
  showToast('访问数据已清除');
}

// ═══ 管理员管理 ═══
async function loadUsers() {
  const users = await api('GET', '/api/admin/users');
  document.getElementById('content').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold">👥 管理员管理</h2>
      <button onclick="showAddUser()" class="btn"><i class="fas fa-plus mr-1"></i>添加管理员</button>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>#</th><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead><tbody>
      ${(users||[]).map((u,i) => `<tr>
        <td class="text-gray-500 text-sm">${i+1}</td>
        <td class="font-medium">${u.username}</td>
        <td><span class="badge badge-green">${u.role}</span></td>
        <td class="text-sm text-gray-500">${u.created_at||'-'}</td>
        <td>${u.username==='admin'?'<span class="text-gray-600 text-sm">不可删除</span>':
          `<button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-300 text-sm" title="删除"><i class="fas fa-trash"></i></button>`}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
}

function showAddUser() {
  openModal(`
    <h3 class="text-lg font-bold mb-4">添加管理员</h3>
    <div class="space-y-3">
      <input id="newUser" class="inp" placeholder="用户名">
      <input id="newPass" class="inp" type="password" placeholder="密码">
      <div class="flex gap-3 justify-end">
        <button onclick="closeModal()" class="btn btn-ghost">取消</button>
        <button onclick="addUser()" class="btn">添加</button>
      </div>
    </div>`);
}

async function addUser() {
  const u = document.getElementById('newUser').value;
  const p = document.getElementById('newPass').value;
  if (!u||!p) return showToast('请填写完整','#ef4444');
  const r = await api('POST', '/api/admin/user', {username:u,password:p});
  if (r.success) { closeModal(); showToast('添加成功'); loadUsers(); }
  else showToast(r.error||'添加失败','#ef4444');
}

async function deleteUser(id) {
  if (!confirm('确定删除此管理员？')) return;
  await api('DELETE', `/api/admin/user/${id}`);
  showToast('已删除'); loadUsers();
}

// ═══ 安全设置 ═══
async function loadSecurity() {
  document.getElementById('content').innerHTML = `
    <h2 class="text-2xl font-bold mb-6">🔒 安全设置</h2>
    <div class="card max-w-lg space-y-4">
      <h3 class="font-semibold">修改密码</h3>
      <div><label class="text-sm text-gray-500 block mb-1">旧密码</label><input id="oldPass" class="inp" type="password"></div>
      <div><label class="text-sm text-gray-500 block mb-1">新密码</label><input id="newPass1" class="inp" type="password"></div>
      <div><label class="text-sm text-gray-500 block mb-1">确认新密码</label><input id="newPass2" class="inp" type="password"></div>
      <button onclick="changePassword()" class="btn">修改密码</button>
    </div>`;
}

async function changePassword() {
  const old = document.getElementById('oldPass').value;
  const n1 = document.getElementById('newPass1').value;
  const n2 = document.getElementById('newPass2').value;
  if (!old||!n1) return showToast('请填写完整','#ef4444');
  if (n1!==n2) return showToast('两次密码不一致','#ef4444');
  const r = await api('POST', '/api/admin/change-password', {old_password:old,new_password:n1});
  if (r.success) { showToast('密码修改成功！'); document.getElementById('oldPass').value=''; document.getElementById('newPass1').value=''; document.getElementById('newPass2').value=''; }
  else showToast(r.error||'修改失败','#ef4444');
}

// ═══ 弹窗工具 ═══
function openModal(html) {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `<div class="modal-box">${html}</div>`;
  m.onclick = e => { if (e.target===m) m.remove(); };
  document.body.appendChild(m);
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
}

// ═══ 启动 ═══
render();
</script>
</body>
</html>
