<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 360" width="740" height="360">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="ac1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ac2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="740" height="360" fill="url(#bg1)"/>
  <!-- 装饰圆 -->
  <circle cx="580" cy="80" r="180" fill="rgba(96,165,250,0.04)"/>
  <circle cx="160" cy="300" r="140" fill="rgba(167,139,250,0.04)"/>
  <circle cx="640" cy="290" r="100" fill="rgba(244,114,182,0.03)"/>
  <!-- 网格线 -->
  <line x1="0" y1="80" x2="740" y2="80" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="160" x2="740" y2="160" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="240" x2="740" y2="240" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="320" x2="740" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- 对话气泡连线 -->
  <line x1="120" y1="100" x2="320" y2="180" stroke="rgba(96,165,250,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="320" y1="180" x2="520" y2="110" stroke="rgba(167,139,250,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="520" y1="110" x2="620" y2="200" stroke="rgba(244,114,182,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- 对话气泡 -->
  <rect x="60" y="60" width="120" height="70" rx="16" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
  <text x="120" y="86" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="monospace" font-weight="bold">用户</text>
  <text x="120" y="105" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">写一首关于</text>
  <text x="120" y="119" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">AI的诗</text>
  <!-- API 服务器图标 -->
  <rect x="270" y="145" width="100" height="70" rx="16" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="320" y="171" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="monospace" font-weight="bold">API</text>
  <text x="320" y="190" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">处理中...</text>
  <rect x="282" y="155" width="8" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
  <!-- 模型响应气泡 -->
  <rect x="470" y="75" width="200" height="70" rx="16" fill="rgba(244,114,182,0.12)" stroke="rgba(244,114,182,0.3)" stroke-width="1.5"/>
  <text x="570" y="101" text-anchor="middle" fill="#f472b6" font-size="10" font-family="monospace" font-weight="bold">AI 模型</text>
  <text x="570" y="120" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">在数字的海洋里</text>
  <text x="570" y="134" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">我是一束光</text>
  <!-- 底部代码行 -->
  <text x="60" y="300" fill="#6b7280" font-size="12" font-family="monospace">&gt; curl https://api.deepseek.com/chat/completions</text>
  <text x="60" y="320" fill="#60a5fa" font-size="12" font-family="monospace">  -H "Authorization: Bearer sk-xxxx"</text>
  <text x="60" y="340" fill="#22c55e" font-size="12" font-family="monospace">  -d '{"model":"deepseek-chat","messages":[...]}'</text>
  <!-- 标题 -->
  <text x="60" y="46" fill="url(#ac1)" font-size="14" font-family="sans-serif" font-weight="bold" letter-spacing="1">大模型 API 调用入门</text>
</svg>