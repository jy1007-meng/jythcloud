var root = document.getElementById('app-root');

for(var i=0;i<allBlocks.length;i++) root.insertAdjacentHTML('beforeend',BLOCKS[allBlocks[i]]());

// 粒子（立即）
BLOCKS.particles();

// 事件委托
document.addEventListener('click',function(e){
  // 文章卡片跳转
  var pc=e.target.closest('.post-card');
  if(pc){var lk=pc.getAttribute('data-link');if(lk)window.location=lk;return}
  // 成员个人主页（按钮/卡片点击均可）
  var mpb=e.target.closest('.member-page-btn');
  if(mpb){var mid=mpb.getAttribute('data-mid');if(mid)openMemberPage(mid);return}
  // 成员卡片点按 -> 打开个人主页
  var mc=e.target.closest('.member-card');
  if(mc){var mid2=mc.querySelector('.member-page-btn').getAttribute('data-mid');if(mid2)openMemberPage(mid2);return}
});

// 选项卡切换（委托）
document.addEventListener('click',function(e){
  var tab=e.target.closest('.member-tab');
  if(!tab) return;
  var id=tab.getAttribute('data-id'), ac=tab.getAttribute('data-accent');
  document.querySelectorAll('.member-tab').forEach(function(t){t.style.opacity='0.6';t.style.borderColor='';t.style.color=''});
  tab.style.opacity='1';tab.style.borderColor=ac;tab.style.color=ac;
  document.querySelectorAll('.member-panel').forEach(function(p){p.style.display=p.getAttribute('data-id')===id?'block':'none'});
});

// 导航菜单
document.getElementById('navToggle').addEventListener('click',function(){
  document.getElementById('navLinks').classList.toggle('open');
});
document.querySelectorAll('.nav-links a').forEach(function(a){
  a.addEventListener('click',function(e){
    document.getElementById('navLinks').classList.remove('open');
    var href=a.getAttribute('href');
    if(!href||href==='#'||href.startsWith('http')) return;
    var id=href.slice(1).replace('-detail','_detail');
    var el=document.getElementById(id);
    if(el) el.scrollIntoView({behavior:'smooth'});
  });
});

// ESC 关闭成员页面
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMemberPage()});

/* ═══ 成员个人主页 CSS ═══ */
<style>
/* ── 遮罩层 ── */

.mp-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(7,7,13,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.06)}

/* ── 头部英雄区 ── */
.mp-hero{text-align:center;padding:64px 24px 48px;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
