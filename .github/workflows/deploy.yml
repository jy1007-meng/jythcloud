name: Deploy JYTHCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/www/wwwroot/jythcloud' }}
            git remote set-url origin https://github.com/jy1007-meng/jythcloud.git
            git pull origin main
            # 重启 Flask API
            if pgrep -f 'python3 /www/wwwroot/jythcloud/app.py'; then
              pkill -f 'python3 /www/wwwroot/jythcloud/app.py'
              sleep 2
            fi
            cd /www/wwwroot/jythcloud && nohup python3 app.py > /tmp/flask.log 2>&1 &
            sleep 2
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/status | grep -q 200; then
              echo "✅ Flask 启动成功！"
            else
              echo "⚠️ Flask 启动中，请手动检查：cat /tmp/flask.log"
            fi
            echo "✅ 部署完成: $(date '+%Y-%m-%d %H:%M:%S')"
          timeout: 120s
          command_timeout: 60m
