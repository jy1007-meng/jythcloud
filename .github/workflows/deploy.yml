name: Deploy JYTHCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Server via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-avz --delete --exclude='.git' --exclude='__pycache__' --exclude='frontend/node_modules' --exclude='frontend/src' --exclude='*.pyc' --exclude='.user.ini'"
          SOURCE: "."
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          TARGET: ${{ secrets.DEPLOY_PATH || '/www/wwwroot/jythcloud' }}
          EXCLUDE_ARTIFACTS: true

      - name: Restart Flask API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 重启 Flask API
            if pgrep -f 'python3 /www/wwwroot/jythcloud/api/app.py'; then
              pkill -f 'python3 /www/wwwroot/jythcloud/api/app.py'
              sleep 2
            fi
            cd /www/wwwroot/jythcloud/api && nohup python3 app.py > /tmp/flask.log 2>&1 &
            sleep 2
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5002/api/status 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Flask 启动成功 (HTTP $HTTP_CODE)"
            else
              echo "⚠️ Flask 状态码: $HTTP_CODE，检查日志: cat /tmp/flask.log"
            fi
            echo "✅ 部署完成: $(date '+%Y-%m-%d %H:%M:%S')"
          timeout: 60s
          command_timeout: 10m
