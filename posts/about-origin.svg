<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 360" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="740" height="360" fill="url(#bg)"/>
  
  <!-- 背景光晕 -->
  <circle cx="120" cy="100" r="160" fill="rgba(96,165,250,0.03)"/>
  <circle cx="620" cy="280" r="140" fill="rgba(244,114,182,0.03)"/>
  
  <!-- 标题 -->
  <text x="370" y="55" text-anchor="middle" fill="url(#accentGrad)" font-size="28" font-family="sans-serif" font-weight="800" letter-spacing="3">从课堂到世界</text>
  <text x="370" y="82" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace" letter-spacing="5">OUR ORIGIN STORY</text>
  
  <!-- 教室场景（左侧书本/课桌抽象） -->
  <rect x="60" y="110" width="130" height="90" rx="10" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="125" y="138" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="sans-serif" font-weight="600">📖 课堂</text>
  <!-- 书本线条 -->
  <line x1="85" y1="155" x2="165" y2="155" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
  <line x1="85" y1="167" x2="155" y2="167" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
  <line x1="85" y1="179" x2="145" y2="179" stroke="rgba(96,165,250,0.15)" stroke-width="1.5"/>
  
  <!-- 过渡箭头：从课堂到实践 -->
  <path d="M195,155 C220,155 240,155 260,155" stroke="url(#line1)" stroke-width="2" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <polygon points="260,150 270,155 260,160" fill="#a78bfa" opacity="0.6"/>
  
  <!-- 实践场景（中心：电脑/代码） -->
  <rect x="265" y="100" width="200" height="110" rx="12" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.25)" stroke-width="1.5"/>
  <text x="365" y="128" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="sans-serif" font-weight="600">💻 实践</text>
  <!-- 代码行 -->
  <text x="285" y="150" fill="#60a5fa" font-size="10" font-family="monospace" opacity="0.8">import ai</text>
  <text x="285" y="165" fill="#f472b6" font-size="10" font-family="monospace" opacity="0.8">model = LLM()</text>
  <text x="285" y="180" fill="#22c55e" font-size="10" font-family="monospace" opacity="0.7">response = model.<tspan fill="#f59e0b">ask</tspan>("你好")</text>
  <!-- 光标闪烁 -->
  <rect x="285" y="192" width="28" height="2" rx="1" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 过渡箭头：从实践到世界 -->
  <path d="M470,155 C500,155 520,155 540,155" stroke="url(#line2)" stroke-width="2" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <polygon points="540,150 550,155 540,160" fill="#f472b6" opacity="0.6"/>
  
  <!-- 世界场景（右侧：地球/连接） -->
  <rect x="545" y="100" width="140" height="110" rx="12" fill="rgba(244,114,182,0.06)" stroke="rgba(244,114,182,0.2)" stroke-width="1"/>
  <text x="615" y="128" text-anchor="middle" fill="#f472b6" font-size="13" font-family="sans-serif" font-weight="600">🌍 世界</text>
  <!-- 简笔画地球 -->
  <circle cx="615" cy="160" r="22" fill="none" stroke="rgba(244,114,182,0.4)" stroke-width="1.5"/>
  <ellipse cx="615" cy="160" rx="22" ry="8" fill="none" stroke="rgba(244,114,182,0.2)" stroke-width="1"/>
  <line x1="593" y1="160" x2="637" y2="160" stroke="rgba(244,114,182,0.2)" stroke-width="1"/>
  <line x1="615" y1="138" x2="615" y2="182" stroke="rgba(244,114,182,0.15)" stroke-width="1"/>
  <!-- 连接点 -->
  <circle cx="600" cy="148" r="2" fill="#f472b6" opacity="0.5"/>
  <circle cx="630" cy="170" r="2" fill="#f472b6" opacity="0.5"/>
  
  <!-- 底部主题词 -->
  <text x="370" y="240" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace" letter-spacing="4">从被动学习 → 主动创造</text>
  
  <!-- 三个人物简笔画（底部） -->
  <!-- 吉天宇 -->
  <g transform="translate(175, 265)">
    <rect x="0" y="0" width="110" height="55" rx="10" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.3)" stroke-width="1.2"/>
    <text x="28" y="25" text-anchor="middle" fill="#60a5fa" font-size="18">🧑‍💻</text>
    <text x="28" y="44" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="sans-serif" font-weight="600">吉天宇 · 全栈</text>
  </g>
  <!-- 谭海涛 -->
  <g transform="translate(315, 265)">
    <rect x="0" y="0" width="110" height="55" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1.2"/>
    <text x="28" y="25" text-anchor="middle" fill="#a78bfa" font-size="18">🔬</text>
    <text x="28" y="44" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="sans-serif" font-weight="600">谭海涛 · 算法</text>
  </g>
  <!-- 胡子雄 -->
  <g transform="translate(455, 265)">
    <rect x="0" y="0" width="110" height="55" rx="10" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.3)" stroke-width="1.2"/>
    <text x="28" y="25" text-anchor="middle" fill="#f472b6" font-size="18">☁️</text>
    <text x="28" y="44" text-anchor="middle" fill="#f472b6" font-size="11" font-family="sans-serif" font-weight="600">胡子雄 · 部署</text>
  </g>
  
  <!-- 底部年份 -->
  <text x="370" y="345" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace" letter-spacing="8">2026</text>
</svg>
